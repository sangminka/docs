<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QT-AI 화면설계 클릭 목업</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1ea;
      --surface: #fffdf8;
      --surface-soft: #f8f5ee;
      --ink: #25231f;
      --muted: #6f685d;
      --line: #ded7ca;
      --primary: #356455;
      --primary-soft: #e5f0ea;
      --accent: #b87932;
      --accent-soft: #f7ead8;
      --danger: #a6423b;
      --admin: #314a63;
      --radius: 8px;
      --shadow: 0 18px 44px rgba(50, 43, 33, .16);
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, #faf8f3 0%, var(--bg) 70%, #ece6da 100%);
      letter-spacing: 0;
    }
    button, input, textarea, select { font: inherit; letter-spacing: 0; }
    button { border: 0; cursor: pointer; }
    button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
      outline: 3px solid rgba(184, 121, 50, .32);
      outline-offset: 2px;
    }
    [hidden] { display: none !important; }

    .workspace {
      display: grid;
      grid-template-columns: 292px minmax(430px, 1fr) 380px;
      min-height: 100vh;
    }
    .sidebar, .inspector {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      background: rgba(255, 253, 248, .78);
      backdrop-filter: blur(10px);
    }
    .sidebar {
      border-right: 1px solid var(--line);
      padding: 22px 18px;
    }
    .inspector {
      border-left: 1px solid var(--line);
      padding: 22px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--primary);
      border-radius: 8px;
      font-weight: 800;
    }
    h1, h2, h3, h4, p { margin-top: 0; }
    .brand h1 { margin: 0; font-size: 17px; line-height: 1.25; }
    .brand p, .subcopy { color: var(--muted); font-size: 12px; line-height: 1.55; }
    .section-title {
      margin: 18px 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .segment {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }
    .segment button, .flow button, .screen-link {
      min-height: 36px;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font-weight: 700;
    }
    .segment button.active, .flow button.active, .screen-link.active {
      color: var(--ink);
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(53, 100, 85, .2);
    }
    .flow {
      display: grid;
      gap: 6px;
    }
    .flow button {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      text-align: left;
    }
    .flow small { color: var(--primary); font-weight: 800; }
    .screen-group { display: grid; gap: 5px; }
    .screen-link {
      width: 100%;
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      padding: 8px 10px;
      text-align: left;
    }
    .screen-link span:first-child {
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
    }
    .screen-link span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .stage {
      display: grid;
      align-content: start;
      justify-items: center;
      gap: 18px;
      padding: 24px clamp(18px, 3vw, 46px);
      min-width: 0;
    }
    .stage-head {
      width: min(100%, 780px);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 14px;
    }
    .stage-head h2 { margin: 0; font-size: 24px; line-height: 1.25; }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      color: var(--primary);
      background: var(--primary-soft);
      border: 1px solid rgba(53, 100, 85, .18);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .phone-shell {
      width: 390px;
      height: 844px;
      padding: 10px;
      border-radius: 32px;
      background: #161616;
      box-shadow: var(--shadow);
    }
    .phone {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 24px;
      background: var(--surface);
    }
    #phoneScreen {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .phone::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      z-index: 20;
      width: 96px;
      height: 21px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #161616;
    }
    .appbar {
      min-height: 78px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 36px 18px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, .97);
    }
    .appbar h3 { margin: 0; font-size: 17px; line-height: 1.25; }
    .appbar small { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }
    .icon-btn {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--primary);
      background: var(--primary-soft);
      font-weight: 900;
    }
    .body {
      flex: 1 1 auto;
      min-height: 0;
      height: auto;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px 96px;
      scrollbar-gutter: stable;
    }
    .body::-webkit-scrollbar { width: 8px; }
    .body::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(111, 104, 93, .26);
    }
    .body.no-nav { height: 100%; padding: 102px 22px 28px; }
    #phoneScreen > .done-state {
      flex: 1 1 auto;
      min-height: 0;
    }
    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 62px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-top: 1px solid var(--line);
      background: rgba(255, 253, 248, .98);
      z-index: 12;
    }
    .bottom-nav button {
      display: grid;
      place-items: center;
      align-content: center;
      gap: 2px;
      color: var(--muted);
      background: transparent;
      font-size: 11px;
      font-weight: 800;
    }
    .bottom-nav button.active { color: var(--primary); }
    .bottom-nav span { font-size: 18px; line-height: 1; }
    .panel, .note-card, .feed-card, .metric, .admin-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }
    .panel { padding: 14px; margin-bottom: 12px; }
    .panel h4 { margin: 0 0 8px; font-size: 15px; }
    .panel p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.65; }
    .lead-title { margin: 0; font-size: 28px; line-height: 1.25; }
    .lead-copy { color: var(--muted); line-height: 1.7; font-size: 14px; }
    .primary-btn, .secondary-btn, .ghost-btn, .danger-btn {
      min-height: 44px;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 800;
    }
    .primary-btn { color: #fff; background: var(--primary); }
    .secondary-btn { color: var(--primary); background: var(--primary-soft); }
    .ghost-btn { color: var(--muted); background: transparent; border: 1px solid var(--line); }
    .danger-btn { color: #fff; background: var(--danger); }
    .kakao-btn { width: 100%; color: #2d2412; background: #fee500; }
    .button-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .button-row > * { flex: 1 1 120px; }
    .fine-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
    }
    .field-label { display: block; margin: 16px 0 8px; font-size: 13px; font-weight: 800; }
    .field, .textarea, .select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 12px;
    }
    .textarea { min-height: 116px; resize: vertical; line-height: 1.6; }
    .status-line { margin-top: 8px; color: var(--primary); font-size: 12px; font-weight: 800; }
    .warning { color: var(--danger) !important; }
    .chip-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
    .chip {
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--surface-soft);
      font-size: 12px;
      font-weight: 800;
    }
    .chip.active { color: #fff; background: var(--primary); border-color: var(--primary); }
    .chip[disabled] {
      cursor: not-allowed;
      opacity: .55;
    }
    .state-tabs {
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }
    .state-tabs p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .empty-state {
      min-height: 360px;
      display: grid;
      place-items: center;
      padding: 22px;
      text-align: center;
    }
    .empty-state h4 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .empty-state p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }
    .verse-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .verse-toolbar {
      display: flex;
      gap: 7px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding: 0 0 10px;
      margin-bottom: 4px;
      scrollbar-width: none;
    }
    .verse-toolbar::-webkit-scrollbar { display: none; }
    .verse-toolbar .chip {
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .tts-mini {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(53, 100, 85, .24);
      border-radius: var(--radius);
      background: var(--primary-soft);
    }
    .tts-mini b {
      display: block;
      font-size: 13px;
    }
    .tts-mini p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .tts-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tts-controls button {
      min-width: 34px;
      min-height: 34px;
      border: 1px solid rgba(53, 100, 85, .18);
      border-radius: 8px;
      color: var(--primary);
      background: #fff;
      font-weight: 900;
    }
    .reference { color: var(--primary); font-size: 14px; font-weight: 900; }
    .verse-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }
    .verse-row:first-child { border-top: 0; }
    .verse-row.selectable { padding-left: 8px; padding-right: 8px; border-radius: 8px; cursor: pointer; }
    .verse-row.studyable { padding-left: 8px; padding-right: 8px; border-radius: 8px; cursor: pointer; }
    .verse-row.studyable:hover { background: var(--surface-soft); }
    .verse-row.selected { background: var(--primary-soft); }
    .inline-verse-detail {
      margin: -2px 0 8px;
      padding: 0 12px 12px 46px;
      border-bottom: 1px solid var(--line);
      background: var(--primary-soft);
      border-radius: 0 0 8px 8px;
    }
    .inline-verse-detail h5 {
      margin: 12px 0 6px;
      font-size: 13px;
    }
    .inline-verse-detail .detail-source {
      margin-top: 12px;
      color: var(--muted);
      font-size: 11px;
    }
    .verse-no { color: var(--accent); font-weight: 900; }
    .verse-ko { margin: 0 0 6px; font-size: 14px; line-height: 1.65; }
    .verse-en { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .accordion { display: grid; gap: 8px; margin: 12px 0; }
    .accordion button {
      width: 100%;
      display: flex;
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--ink);
      padding: 12px;
      font-weight: 800;
    }
    .explain {
      padding: 12px;
      border: 1px solid rgba(53, 100, 85, .2);
      border-radius: 8px;
      background: #fff;
    }
    .term-list { display: grid; gap: 6px; margin-top: 10px; }
    .term-list div { display: grid; grid-template-columns: 76px 1fr; gap: 8px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .term-list b { color: var(--primary); }
    .verse-study-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      margin-bottom: 10px;
    }
    .verse-study-head {
      width: 100%;
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0;
      color: var(--ink);
      background: transparent;
      text-align: left;
    }
    .verse-study-head strong {
      display: block;
      font-size: 14px;
    }
    .verse-study-head small {
      color: var(--muted);
      font-size: 11px;
    }
    .verse-study-body {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .verse-study-body h5 {
      margin: 12px 0 6px;
      font-size: 13px;
    }
    .floating-ai {
      position: absolute;
      right: 18px;
      bottom: 104px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      color: #fff;
      background: var(--accent);
      box-shadow: 0 12px 26px rgba(95, 56, 16, .24);
      font-weight: 900;
    }
    .floating-write {
      position: absolute;
      right: 20px;
      bottom: 78px;
      z-index: 11;
      width: 54px;
      height: 54px;
      border-radius: 16px;
      color: #fff;
      background: var(--primary);
      box-shadow: 0 12px 26px rgba(43, 94, 77, .24);
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
    }
    .bottom-action {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 72px;
      z-index: 10;
      display: grid;
      gap: 8px;
    }
    .sheet {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }
    .sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(25, 23, 19, .28);
      opacity: 0;
      transition: opacity .18s ease;
    }
    .sheet-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 86%;
      height: 100%;
      padding: 42px 16px 20px;
      background: var(--surface);
      box-shadow: -12px 0 34px rgba(40, 36, 30, .18);
      transform: translateX(100%);
      transition: transform .2s ease;
      overflow: auto;
    }
    .sheet.open { pointer-events: auto; }
    .sheet.open .sheet-backdrop { opacity: 1; }
    .sheet.open .sheet-panel { transform: translateX(0); }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
    .toggle {
      width: 50px;
      height: 28px;
      padding: 3px;
      border-radius: 999px;
      background: #cfc7ba;
      transition: background .18s ease;
    }
    .toggle::after {
      content: "";
      display: block;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      transition: transform .18s ease;
    }
    .toggle.on { background: var(--primary); }
    .toggle.on::after { transform: translateX(22px); }
    .save-bar {
      position: sticky;
      bottom: -1px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
      gap: 8px;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(255, 253, 248, 0), var(--surface) 28%);
    }
    .note-stepper {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    .note-stepper span {
      min-height: 38px;
      display: grid;
      place-items: center;
      padding: 7px 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fff;
      font-size: 11px;
      font-weight: 800;
    }
    .note-stepper span.active {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }
    .note-writing-panel {
      min-height: 440px;
      display: flex;
      flex-direction: column;
    }
    .note-writing-panel .textarea {
      flex: 1 1 auto;
      min-height: 280px;
      font-size: 16px;
      line-height: 1.75;
    }
    .note-step-help {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .done-state {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
    }
    .done-mark {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      margin: 0 auto 12px;
      border-radius: 18px;
      color: #fff;
      background: var(--primary);
      font-size: 30px;
      font-weight: 900;
    }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
    .day {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: var(--muted);
      background: var(--surface-soft);
      font-size: 11px;
      font-weight: 700;
    }
    .day.marked { color: #fff; background: var(--primary); }
    .progress { height: 10px; overflow: hidden; border-radius: 999px; background: var(--surface-soft); }
    .progress span { display: block; width: 68%; height: 100%; background: var(--accent); }
    .feed-card, .note-card {
      width: 100%;
      display: block;
      padding: 14px;
      margin-bottom: 10px;
      text-align: left;
      color: var(--ink);
    }
    .share-card-main {
      width: 100%;
      display: block;
      margin: -2px 0 12px;
      padding: 2px 0 0;
      text-align: left;
      color: var(--ink);
      background: transparent;
    }
    .share-author {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-right: 6px;
    }
    .share-author-info {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }
    .avatar {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: var(--primary);
      font-weight: 900;
    }
    .share-author strong {
      display: block;
      font-size: 14px;
    }
    .share-author small {
      color: var(--muted);
      font-size: 12px;
    }
    .share-actions {
      display: inline-flex;
      flex: 0 0 auto;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      margin-left: auto;
    }
    .share-body h4 {
      margin: 0 0 10px;
      font-size: 17px;
    }
    .share-body p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .heart-btn {
      min-height: 28px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 4px 0;
      color: var(--muted);
      background: transparent;
      font-weight: 900;
    }
    .heart-btn.liked {
      color: #9b3e3a;
      background: transparent;
      border-color: transparent;
    }
    .report-icon {
      min-height: 28px;
      min-width: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: transparent;
      font-weight: 900;
    }
    .report-icon svg {
      width: 16px;
      height: 16px;
      display: block;
      stroke: currentColor;
    }
    .comment-item {
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }
    .comment-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;

      "A-01": () => `<main class="body no-nav"><div><div class="brand-mark" style="width:68px;height:68px;font-size:24px;margin-bottom:22px">QT</div><h2 class="lead-title">진입 상태를 확인합니다</h2><p class="lead-copy">토큰, 회원 상태, 튜토리얼 완료 여부에 따라 다음 화면이 달라집니다.</p></div><div class="panel"><h4>분기 예시</h4><p>유효 토큰 + 튜토리얼 완료: 오늘 QT<br>유효 토큰 + 튜토리얼 미완료: 튜토리얼<br>토큰 없음/만료: 로그인<br>탈퇴 계정: 복구 불가 안내</p></div><div class="flow"><button data-go="Q-01" type="button">자동 로그인 성공</button><button data-go="A-04" type="button">튜토리얼 미완료</button><button data-go="A-02" type="button">토큰 만료</button></div><div class="panel"><h4 class="warning">탈퇴 계정</h4><p>탈퇴 완료 계정은 로그인할 수 없으며 이전 기록 복구가 불가하다는 안내 후 로그인 화면으로 이동합니다.</p></div></main>`,
      "A-02": () => `<main class="body no-nav"><div><div class="brand-mark" style="width:68px;height:68px;font-size:24px;margin-bottom:22px">QT</div><h2 class="lead-title">오늘 말씀으로 바로 들어갑니다</h2><p class="lead-copy">로그인 전에는 기능 화면을 제공하지 않습니다. 카카오 인증 후 닉네임 설정 또는 오늘의 QT로 이동합니다.</p></div><div><button class="primary-btn kakao-btn" data-go="A-03" type="button">카카오로 시작하기</button><div class="fine-links"><span>이용약관</span><span>개인정보처리방침</span></div><p class="status-line warning">실패 상태: 인증 취소, 네트워크 실패, 서버 오류</p></div></main>`,
      "A-03": () => `${appbar("닉네임 설정", "나눔 공간에 공개될 이름")}<main class="body"><div class="panel"><h4>닉네임 공개 안내</h4><p>공유를 선택하면 이 닉네임이 나눔 공간에 표시됩니다. 설정 완료 전까지 변경 가능합니다.</p></div><label class="field-label">닉네임</label><input class="field" value="포도나무가지"><p class="status-line">사용 가능한 닉네임입니다.</p><div class="panel" style="margin-top:14px"><h4>오류 상태</h4><p>중복, 허용 문자 오류, 저장 실패 시 입력값을 유지하고 다시 시도합니다.</p></div><button class="primary-btn" data-go="Q-01" type="button" style="width:100%">다음</button></main>`,
      "A-04": () => `${appbar("QT 튜토리얼", "처음 사용하는 분을 위한 흐름")}<main class="body"><div class="panel"><h4>1. 오늘 본문 읽기</h4><p>한글과 영어 본문을 절 단위로 읽습니다.</p></div><div class="panel"><h4>2. 필요할 때만 펼치기</h4><p>요약, 해설, 용어는 사용자가 선택할 때만 열립니다.</p></div><div class="panel"><h4>3. 4섹션으로 기록</h4><p>묵상 노트는 자동 저장 없이 임시저장과 저장을 직접 누릅니다.</p></div><div class="panel"><h4>4. 원할 때만 공유</h4><p>기본은 비공개이며 닉네임 공개 안내 후 공유됩니다.</p></div><button class="primary-btn" data-go="Q-01" type="button" style="width:100%">시작하기</button></main>${bottomNav("Q")}`,

      "Q-02": () => `${appbar("절별 요약/해설/용어", "요한복음 15:1-5", true)}<main class="body"><div class="panel"><h4>절별 콘텐츠 구조</h4><p>한 줄 요약은 <b>verse_explanations.summary</b>, 해설은 <b>verse_explanations.explanation</b>, 용어는 <b>glossary_terms</b>에서 표시합니다.</p></div><div class="chip-row"><button class="chip" data-action="english" type="button">영어 ${state.englishOpen ? "접기" : "보기"}</button><button class="chip" data-toast="선택한 절의 해설 영역만 다시 요청합니다." type="button">해설 재시도</button></div>${verseStudyCards()}<div class="panel"><h4>절별 누락 상태</h4><p>요약, 해설, 용어 중 승인된 데이터가 없거나 출처가 누락된 항목은 “준비된 해설 없음”으로 표시하고, 검증중/반려/숨김 콘텐츠는 원문을 노출하지 않습니다.</p></div></main>${bottomNav("Q")}`,
      "Q-03": () => `${appbar("시뮬레이터", "오늘 QT 전용", true)}<main class="body"><div class="panel" style="height:330px;display:grid;place-items:center;text-align:center;background:#e5f0ea"><div><strong style="display:block;font-size:48px;color:var(--primary)">VINE</strong><p>포도나무와 가지 장면 카드</p><span class="badge">검증 통과 스크립트</span></div></div><div class="button-row"><button class="ghost-btn">이전</button><button class="secondary-btn">재생</button><button class="ghost-btn">다음</button></div><div class="panel"><h4>제한 상태</h4><p>검증중 또는 승인되지 않은 장면은 사용자에게 노출하지 않습니다.</p></div></main>${bottomNav("Q")}`,

      "Q-05": () => `${appbar("TTS 미니 플레이어", "본문/해설 음성", true)}<main class="body">${qtVerses(false)}<div class="panel"><h4>음성 재생</h4><p>본문과 해설 화면에서만 제공합니다. 노트와 나눔 글에는 적용하지 않습니다.</p><div class="button-row" style="margin-top:12px"><button class="secondary-btn">재생</button><button class="ghost-btn">이전 절</button><button class="ghost-btn">다음 절</button></div></div><div class="panel"><h4>미지원 안내</h4><p class="warning">현재 기기에서는 음성 재생을 사용할 수 없습니다.</p></div></main>${bottomNav("Q")}`,
      "Q-06": () => qtNoteStepMarkup(),
      "Q-07": () => `${appbar("저장 완료", "묵상 노트")}<main class="done-state"><div><div class="done-mark">✓</div><h3>저장되었습니다</h3><p class="lead-copy">작성 내용과 저장 시각이 기록되었습니다. 다음 행동을 선택해 주세요.</p><div class="panel"><p>2026.05.17 15:42 저장</p></div><div class="flow"><button data-go="Q-01" type="button">오늘 QT로 돌아가기</button><button data-go="S-01" type="button">나눔에 공유하기</button><button data-go="M-01" type="button">마이페이지에서 보기</button></div></div></main>${bottomNav("Q")}`,
      "B-01": () => `${appbar("성경", "요한복음 15장")}<main class="body"><div class="button-row"><select class="select"><option>요한복음</option></select><select class="select"><option>15장</option></select></div><div class="button-row" style="margin:10px 0 12px"><button class="primary-btn" data-go="B-02" type="button">절 선택해서 설교 노트</button></div>${bibleActions()}${ttsMiniPlayer()}${qtVerses(false, { studyable: true, caption: "오늘 QT 범위와 일치하는 구절" })}<div class="panel"><h4>정책</h4><p>사전 생성된 해설이 있는 절은 절을 눌러 한 줄 요약, 해설, 용어를 확인합니다. 설교 노트는 한 절 또는 여러 절을 선택해 작성하고, 시뮬레이터와 QT 노트 작성 CTA는 노출하지 않습니다.</p></div></main><button class="floating-ai" data-go="Q-04" type="button">AI</button>${bottomNav("B")}`,
      "B-02": () => `${appbar("절 선택", "설교 노트 연결")}<main class="body"><p class="status-line">선택된 절: ${state.noteVerses.join(", ")}절</p>${qtVerses(true)}<div class="bottom-action"><button class="primary-btn" data-go="B-03" type="button">설교 노트 작성</button></div></main>${bottomNav("B")}`,
      "B-03": () => `${appbar("설교 노트", `요한복음 15:${state.noteVerses.join(", ")}`)}<main class="body"><div class="panel"><h4>연결 구절</h4><p>${state.noteVerses.join(", ")}절이 노트에 연결되었습니다.</p></div><label class="field-label">제목</label><input class="field" value="포도나무 비유 설교 메모"><label class="field-label">본문</label><textarea class="textarea" style="min-height:230px">선택한 구절을 중심으로 설교 내용을 정리합니다.</textarea><div class="save-bar"><button class="ghost-btn" data-toast="임시저장되었습니다." type="button">임시저장</button><button class="primary-btn" data-go="B-01" data-toast="설교 노트를 저장하고 성경 읽기로 돌아왔습니다." type="button">저장</button></div></main>${bottomNav("B")}`,
      "N-01": () => `${appbar("노트", "카테고리별 기록")}<main class="body" style="padding-bottom:126px"><input class="field" placeholder="노트 검색"><div class="chip-row" style="margin-top:12px">${["전체", "QT", "설교", "기도", "회개", "감사"].map((item) => `<button class="chip ${state.noteFilter === item ? "active" : ""}" data-filter="${item}" type="button">${item}</button>`).join("")}</div>${["QT 묵상 노트", "포도나무 비유 설교 메모", "이번 주 기도제목", "돌아볼 마음", "오늘의 감사"].map((title, i) => `<button class="note-card" data-go="N-04" type="button"><b>${title}</b><p class="lead-copy" style="margin:6px 0">${["QT · 요한복음 15:1-5", "설교 · 요한복음 15:1-2", "기도 · 본문 연결 없음", "회개 · 본문 연결 없음", "감사 · 본문 연결 없음"][i]}</p><span class="badge">${i === 0 ? "MEDITATION" : ["SERMON", "PRAYER", "REPENTANCE", "GRATITUDE"][i - 1]}</span></button>`).join("")}<div class="panel"><h4>조회와 작성 구분</h4><p>노트 탭에서는 5개 카테고리를 모두 조회합니다. 새 작성은 기도·회개·감사만 가능하며, QT 노트는 오늘 QT 화면에서, 설교 노트는 성경 절 선택 화면에서 작성합니다.</p></div></main><button class="floating-write" data-go="N-02" type="button" aria-label="기도 회개 감사 작성">+</button>${bottomNav("N")}`,

      "S-02": () => `${appbar("나눔 상세", "포도나무가지")}${reportSheet()}<main class="body"><article class="panel share-body"><div class="share-author"><div class="share-author-info"><div class="avatar">포</div><div><strong>포도나무가지</strong><small>2026.05.17 · 요한복음 15:1-5</small></div></div><div class="share-actions"><button class="heart-btn liked" data-toast="좋아요를 취소했습니다. 실패 시 기존 상태를 유지하고 다시 시도 안내를 표시합니다." type="button" aria-label="좋아요 취소">♥ 8</button><button class="report-icon" data-action="report" type="button" aria-label="신고"><svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path><path d="M13.7 21a2 2 0 0 1-3.4 0"></path></svg></button></div></div><h4>말씀 안에 머무는 연습</h4><p><b>마음에 남은 말씀</b><br>말씀 안에 머무는 것이 열매의 시작이라는 점이 마음에 남습니다.</p><p><b>적용할 일</b><br>오늘 중요한 결정을 서두르지 않고 기도로 확인하겠습니다.</p><span class="badge" style="margin-top:12px">MEDITATION</span></article><section class="panel"><h4>상태 확인</h4><p>comments_enabled=true · source_note_deleted_at=null<br>중복 신고는 새 접수 대신 기존 신고 상태를 안내합니다.</p></section><section class="panel"><h4>댓글 <span class="badge">1</span></h4><div class="comment-item"><strong>작은등불</strong><p>저도 오늘 이 말씀을 붙들고 하루를 시작합니다.</p><button class="ghost-btn" data-toast="본인이 작성한 댓글만 삭제할 수 있습니다." type="button" style="width:100%;margin-top:8px">댓글 삭제</button></div><input class="field" placeholder="댓글 작성" style="margin-top:12px"></section><section class="panel"><h4>댓글 OFF 상태</h4><p>comments_enabled=false이면 댓글 입력창을 숨기고 댓글을 받을 수 없다는 안내만 표시합니다.</p></section></main>${bottomNav("S")}`,

      "M-03": () => `${appbar("내 찬양", "저장 곡과 로컬 음원")}<main class="body"><div class="panel"><h4>저장된 큐레이션</h4><p>praise_songs.ACTIVE와 member_praise_songs를 기준으로 표시합니다.</p></div>${["내 주를 가까이", "은혜"].map((title, i) => `<div class="note-card"><b>${title}</b><p class="lead-copy" style="margin:6px 0">${i === 0 ? "찬양팀 · 외부 링크 정상" : "아티스트 · 외부 링크 무효"}</p><span class="badge">${i === 0 ? "SAVED" : "LINK_INVALID"}</span><div class="button-row" style="margin-top:10px"><button class="secondary-btn" type="button">재생</button><button class="ghost-btn" data-toast="내 찬양에서 해제합니다." type="button">저장 해제</button></div></div>`).join("")}<div class="panel"><h4>디바이스 음원</h4><p>서버 업로드 없이 로컬 파일 접근만 허용합니다. 권한 거부 시 OS 권한 안내를 표시합니다.</p><button class="ghost-btn" data-toast="디바이스 음원 권한 안내를 표시합니다." type="button" style="width:100%;margin-top:10px">로컬 음원 불러오기</button></div><div class="panel"><h4>빈 상태</h4><p>저장한 찬양이 없습니다. 찬양 큐레이션에서 저장하면 이곳에 표시됩니다.</p></div></main>${bottomNav("M")}`,
      "M-05": () => `${appbar("내 나눔", "공유 중인 글 관리")}<main class="body"><div class="panel"><h4>공유 정책</h4><p>현재 나눔 피드에 공개 중인 글만 표시합니다. 공개 중단이나 삭제가 완료되면 이 목록에서 사라집니다.</p></div>${[
        ["QT 묵상 노트", "MEDITATION · 요한복음 15:1-5", "공개 중 · 좋아요 8 · 댓글 1", true],

      if (id === "AD-02") return `${header}<div class="admin-panel panel"><div class="button-row"><input class="field" value="2026-05-17"><input class="field" value="요한복음 15:1-5"><select class="select"><option>DRAFT</option><option>PUBLISHED</option><option>HIDDEN</option></select></div><div class="button-row" style="margin-top:10px"><button class="ghost-btn">임시저장</button><button class="primary-btn">게시</button></div></div>${table(["검증", "결과", "메모"], [["날짜 중복", "정상", "-"], ["본문 범위", "정상", "시작 절 <= 끝 절"], ["감사 로그", "기록 예정", "게시 시점 저장"]])}`;
      if (id === "AD-03") return `${header}<div class="chip-row">${["검증중", "승인", "반려", "숨김"].map((c, i) => `<button class="chip ${i === 0 ? "active" : ""}">${c}</button>`).join("")}</div>${table(["유형", "본문 좌표", "검증 체크", "처리"], [["해설", "요 15:2", "출처 · 금지 표현 · 사실 정합성", "승인 / 반려 / 보류"], ["Q&A 답변", "요 15:5", "추천 · 말투 · 단발성", "승인 / 반려 / 숨김"]])}<div class="panel"><h4>노출 정책</h4><p>검증용 체크리스트 원문과 비공개 메타데이터는 사용자 화면에 노출하지 않습니다.</p></div>`;
      if (id === "AD-04") return `${header}${table(["상태", "대상", "사유", "처리"], [["RECEIVED", "나눔 댓글", "부적절한 내용", "숨김 / 반려 / 제재"], ["REVIEWING", "AI 답변", "정책 위반 의심", "검토중"]])}`;
      if (id === "AD-05") return `${header}${table(["곡명", "아티스트", "링크", "상태"], [["내 주를 가까이", "찬양팀", "https://...", "ACTIVE"], ["은혜", "아티스트", "링크 오류", "HIDDEN"]])}<div class="panel"><p>사용자 기기 음원 업로드는 제공하지 않습니다. 외부 링크와 메타데이터만 관리합니다.</p></div>`;
      if (id === "AD-06") return `${header}<div class="panel"><label class="field-label">공지 제목</label><input class="field" value="5월 QT 업데이트 안내"><label class="field-label">본문</label><textarea class="textarea">오늘의 QT 해설 콘텐츠가 보강되었습니다.</textarea><div class="button-row" style="margin-top:10px"><button class="ghost-btn">초안 저장</button><button class="primary-btn">발행</button></div></div>${table(["상태", "알림", "감사 로그"], [["DRAFT", "없음", "작성 기록"], ["PUBLISHED", "NOTICE 생성", "발행 기록"]])}`;

    function table(heads, rows) {

      const groups = {};

        groups[meta.group] ||= [];

    }

      const ids = flows[state.flow];
      $("#storyMap").innerHTML = ids.map((id, i) => `<button class="story-node ${state.screen === id || state.admin === id ? "active" : ""}" data-${id.startsWith("AD") ? "admin" : "go"}="${id}" type="button"><strong>${i + 1}. ${id}</strong><span>${screenMeta[id].name}</span></button>`).join("");
    }
    function renderDefinitions(meta, id) {
      const qtStateLabels = {
        published: "정상: 게시된 본문과 선택형 보조 기능을 표시",
        empty: "미등록: 오늘 QT가 준비되지 않았다는 빈 상태 표시",
        hidden: "숨김: 내부 상태를 노출하지 않는 준비중 안내",
        cached: "캐시 본문: 본문만 표시하고 해설/AI/TTS/동기화 제한",
        error: "조회 실패: 전체 실패 안내와 재시도 제공",
        partial: "부분 실패: 본문은 유지하고 실패한 해설 영역만 재시도"
      };
      const rows = [
        ["화면 목적", meta.purpose],
        ["필수 상태", meta.states.join(" · ")],
        ["UX 원칙", "핵심 정보는 유지하고 실패 영역에만 재시도 안내를 둡니다. 저장/공유/탈퇴처럼 영향이 큰 행동은 결과를 명확히 표시합니다."]

      if (id === "Q-01") rows.splice(2, 0, ["현재 목업 상태", qtStateLabels[state.qtState]]);

    function renderMobile() {
      const meta = screenMeta[state.screen];

      $("#stagePurpose").textContent = meta.purpose;

      $("#phoneScreen").innerHTML = (renderers[state.screen] || renderers["Q-01"])();
      renderDefinitions(meta, state.screen);

      const meta = screenMeta[state.admin];
      $("#stageTitle").textContent = meta.name;

      renderDefinitions(meta, state.admin);

      const isAdmin = state.mode === "admin";
      $("#mobileMock").hidden = isAdmin;
      $("#adminMock").hidden = !isAdmin;
      $$(".segment button").forEach((btn) => btn.classList.toggle("active", btn.dataset.mode === state.mode));

      renderSidebar();
      renderStoryMap();
      if (isAdmin) renderAdmin();
      else renderMobile();
    }
    function go(id) {
      if (id.startsWith("AD")) {
        state.mode = "admin";
        state.flow = "admin";
        state.admin = id;
      } else {
        state.mode = "mobile";
        state.screen = id;
        state.reportOpen = false;
        if (id === "Q-06") state.noteStep = 0;
        if (flows.core.includes(id)) state.flow = "core";
        else if (flows.support.includes(id)) state.flow = "support";
        else if (flows.ai.includes(id)) state.flow = "ai";
      }
      render();
    }
    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    document.addEventListener("click", (event) => {
      const goBtn = event.target.closest("[data-go]");
      const adminBtn = event.target.closest("[data-admin]");
      const modeBtn = event.target.closest("[data-mode]");
      const flowBtn = event.target.closest("[data-flow]");
      const actionBtn = event.target.closest("[data-action]");
      const toastBtn = event.target.closest("[data-toast]");
      const filterBtn = event.target.closest("[data-filter]");
      const shareFilterBtn = event.target.closest("[data-share-filter]");
      const verseRow = event.target.closest("[data-select-verse]");
      const qtStateBtn = event.target.closest("[data-qt-state]");
      const studyVerseBtn = event.target.closest("[data-study-verse]");
      const openStudyBtn = event.target.closest("[data-open-study]");
      const noteTypeBtn = event.target.closest("[data-note-type]");
      if (goBtn) go(goBtn.dataset.go);
      if (adminBtn) {
        state.mode = "admin";
        state.flow = "admin";
        state.admin = adminBtn.dataset.admin;
        render();
      }
      if (modeBtn) {
        state.mode = modeBtn.dataset.mode;
        if (state.mode === "admin") state.flow = "admin";
        render();
      }
      if (flowBtn) {
        state.flow = flowBtn.dataset.flow;
        if (state.flow === "admin") {
          state.mode = "admin";
          state.admin = "AD-01";
        } else {
          state.mode = "mobile";
          state.screen = flows[state.flow][0];
        }
        render();
      }
      if (verseRow) {
        const verse = verseRow.dataset.selectVerse;
        state.noteVerses = state.noteVerses.includes(verse)
          ? state.noteVerses.filter((item) => item !== verse)
          : [...state.noteVerses, verse].sort((a, b) => Number(a) - Number(b));
        render();
      }
      if (filterBtn) {
        state.noteFilter = filterBtn.dataset.filter;
        render();
      }
      if (shareFilterBtn) {
        state.shareFilter = shareFilterBtn.dataset.shareFilter;
        render();
      }
      if (qtStateBtn) {
        state.qtState = qtStateBtn.dataset.qtState;
        render();
      }
      if (studyVerseBtn) {
        state.studyVerse = studyVerseBtn.dataset.studyVerse;
        render();
      }
      if (openStudyBtn) {
        const verse = openStudyBtn.dataset.openStudy;
        if (state.inlineStudyOpen && state.studyVerse === verse) {
          state.inlineStudyOpen = false;
        } else {
          state.studyVerse = verse;
          state.inlineStudyOpen = true;
        }
        render();
      }
      if (noteTypeBtn) {
        state.freeNoteType = noteTypeBtn.dataset.noteType;
        state.screen = "N-03";
        state.flow = "support";
        state.mode = "mobile";
        render();
      }
      if (actionBtn) {
        const action = actionBtn.dataset.action;
        if (action === "share") state.shareOn = !state.shareOn;
        if (action === "english") state.englishOpen = !state.englishOpen;
        if (action === "tts") {
          state.ttsOpen = !state.ttsOpen;
          if (state.ttsOpen) state.ttsPlaying = true;
        }
        if (action === "tts-toggle") state.ttsPlaying = !state.ttsPlaying;
        if (action === "tts-prev") {
          const currentIndex = verses.findIndex(([no]) => no === state.ttsVerse);
          state.ttsVerse = verses[Math.max(0, currentIndex - 1)]?.[0] || "1";
          state.ttsPlaying = true;
        }
        if (action === "tts-next") {
          const currentIndex = verses.findIndex(([no]) => no === state.ttsVerse);
          state.ttsVerse = verses[Math.min(verses.length - 1, currentIndex + 1)]?.[0] || "1";
          state.ttsPlaying = true;
        }
        if (action === "toggle-explain") state.explanationOpen = !state.explanationOpen;
        if (action === "note-prev") state.noteStep = Math.max(0, state.noteStep - 1);
        if (action === "note-next") state.noteStep = Math.min(qtNoteSections.length - 1, state.noteStep + 1);
        if (action === "report") {
          state.reportOpen = true;
        }
        if (action === "report-close") {
          state.reportOpen = false;
        }
        if (action === "report-submit") {
          state.reportOpen = false;
          showToast("신고가 접수되었습니다.");
        }
        render();
      }
      if (event.target.closest("[data-close-sheet]")) {
        state.screen = "Q-01";
        render();
      }
      if (toastBtn) showToast(toastBtn.dataset.toast);
    });

    render();
  </script>
</body>
</html>
