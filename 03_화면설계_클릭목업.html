<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QT-AI 화면설계 클릭 목업</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1ea;
      --surface: #fffdf8;
      --surface-soft: #f8f5ee;
      --ink: #25231f;
      --muted: #6f685d;
      --line: #ded7ca;
      --primary: #356455;
      --primary-soft: #e5f0ea;
      --accent: #b87932;
      --accent-soft: #f7ead8;
      --danger: #a6423b;
      --admin: #314a63;
      --radius: 8px;
      --shadow: 0 18px 44px rgba(50, 43, 33, .16);
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, #faf8f3 0%, var(--bg) 70%, #ece6da 100%);
      letter-spacing: 0;
    }
    button, input, textarea, select { font: inherit; letter-spacing: 0; }
    button { border: 0; cursor: pointer; }
    button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
      outline: 3px solid rgba(184, 121, 50, .32);
      outline-offset: 2px;
    }
    [hidden] { display: none !important; }

    .workspace {
      display: grid;
      grid-template-columns: 292px minmax(430px, 1fr) 380px;
      min-height: 100vh;
    }
    .sidebar, .inspector {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      background: rgba(255, 253, 248, .78);
      backdrop-filter: blur(10px);
    }
    .sidebar {
      border-right: 1px solid var(--line);
      padding: 22px 18px;
    }
    .inspector {
      border-left: 1px solid var(--line);
      padding: 22px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--primary);
      border-radius: 8px;
      font-weight: 800;
    }
    h1, h2, h3, h4, p { margin-top: 0; }
    .brand h1 { margin: 0; font-size: 17px; line-height: 1.25; }
    .brand p, .subcopy { color: var(--muted); font-size: 12px; line-height: 1.55; }
    .section-title {
      margin: 18px 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .segment {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }
    .segment button, .flow button, .screen-link {
      min-height: 36px;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font-weight: 700;
    }
    .segment button.active, .flow button.active, .screen-link.active {
      color: var(--ink);
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(53, 100, 85, .2);
    }
    .flow {
      display: grid;
      gap: 6px;
    }
    .flow button {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      text-align: left;
    }
    .flow small { color: var(--primary); font-weight: 800; }
    .screen-group { display: grid; gap: 5px; }
    .screen-link {
      width: 100%;
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      padding: 8px 10px;
      text-align: left;
    }
    .screen-link span:first-child {
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
    }
    .screen-link span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .stage {
      display: grid;
      align-content: start;
      justify-items: center;
      gap: 18px;
      padding: 24px clamp(18px, 3vw, 46px);
      min-width: 0;
    }
    .stage-head {
      width: min(100%, 780px);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 14px;
    }
    .stage-head h2 { margin: 0; font-size: 24px; line-height: 1.25; }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      color: var(--primary);
      background: var(--primary-soft);
      border: 1px solid rgba(53, 100, 85, .18);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .phone-shell {
      width: 390px;
      height: 844px;
      padding: 10px;
      border-radius: 32px;
      background: #161616;
      box-shadow: var(--shadow);
    }
    .phone {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 24px;
      background: var(--surface);
    }
    .phone::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      z-index: 20;
      width: 96px;
      height: 21px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #161616;
    }
    .appbar {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 36px 18px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, .97);
    }
    .appbar h3 { margin: 0; font-size: 17px; line-height: 1.25; }
    .appbar small { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }
    .icon-btn {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--primary);
      background: var(--primary-soft);
      font-weight: 900;
    }
    .body {
      height: calc(100% - 78px);
      overflow: auto;
      padding: 16px 16px 96px;
    }
    .body.no-nav { height: 100%; padding: 102px 22px 28px; }
    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 62px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-top: 1px solid var(--line);
      background: rgba(255, 253, 248, .98);
      z-index: 12;
    }
    .bottom-nav button {
      display: grid;
      place-items: center;
      align-content: center;
      gap: 2px;
      color: var(--muted);
      background: transparent;
      font-size: 11px;
      font-weight: 800;
    }
    .bottom-nav button.active { color: var(--primary); }
    .bottom-nav span { font-size: 18px; line-height: 1; }
    .panel, .note-card, .feed-card, .metric, .admin-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }
    .panel { padding: 14px; margin-bottom: 12px; }
    .panel h4 { margin: 0 0 8px; font-size: 15px; }
    .panel p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.65; }
    .lead-title { margin: 0; font-size: 28px; line-height: 1.25; }
    .lead-copy { color: var(--muted); line-height: 1.7; font-size: 14px; }
    .primary-btn, .secondary-btn, .ghost-btn, .danger-btn {
      min-height: 44px;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 800;
    }
    .primary-btn { color: #fff; background: var(--primary); }
    .secondary-btn { color: var(--primary); background: var(--primary-soft); }
    .ghost-btn { color: var(--muted); background: transparent; border: 1px solid var(--line); }
    .danger-btn { color: #fff; background: var(--danger); }
    .kakao-btn { width: 100%; color: #2d2412; background: #fee500; }
    .button-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .button-row > * { flex: 1 1 120px; }
    .fine-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
    }
    .field-label { display: block; margin: 16px 0 8px; font-size: 13px; font-weight: 800; }
    .field, .textarea, .select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 12px;
    }
    .textarea { min-height: 116px; resize: vertical; line-height: 1.6; }
    .status-line { margin-top: 8px; color: var(--primary); font-size: 12px; font-weight: 800; }
    .warning { color: var(--danger) !important; }
    .chip-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
    .chip {
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--surface-soft);
      font-size: 12px;
      font-weight: 800;
    }
    .chip.active { color: #fff; background: var(--primary); border-color: var(--primary); }
    .verse-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .reference { color: var(--primary); font-size: 14px; font-weight: 900; }
    .verse-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }
    .verse-row:first-child { border-top: 0; }
    .verse-row.selectable { padding-left: 8px; padding-right: 8px; border-radius: 8px; cursor: pointer; }
    .verse-row.selected { background: var(--primary-soft); }
    .verse-no { color: var(--accent); font-weight: 900; }
    .verse-ko { margin: 0 0 6px; font-size: 14px; line-height: 1.65; }
    .verse-en { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .accordion { display: grid; gap: 8px; margin: 12px 0; }
    .accordion button {
      width: 100%;
      display: flex;
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--ink);
      padding: 12px;
      font-weight: 800;
    }
    .explain {
      padding: 12px;
      border: 1px solid rgba(53, 100, 85, .2);
      border-radius: 8px;
      background: #fff;
    }
    .term-list { display: grid; gap: 6px; margin-top: 10px; }
    .term-list div { display: grid; grid-template-columns: 76px 1fr; gap: 8px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .term-list b { color: var(--primary); }
    .floating-ai {
      position: absolute;
      right: 18px;
      bottom: 104px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      color: #fff;
      background: var(--accent);
      box-shadow: 0 12px 26px rgba(95, 56, 16, .24);
      font-weight: 900;
    }
    .bottom-action {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 72px;
      z-index: 10;
      display: grid;
      gap: 8px;
    }
    .sheet {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }
    .sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(25, 23, 19, .28);
      opacity: 0;
      transition: opacity .18s ease;
    }
    .sheet-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 86%;
      height: 100%;
      padding: 42px 16px 20px;
      background: var(--surface);
      box-shadow: -12px 0 34px rgba(40, 36, 30, .18);
      transform: translateX(100%);
      transition: transform .2s ease;
      overflow: auto;
    }
    .sheet.open { pointer-events: auto; }
    .sheet.open .sheet-backdrop { opacity: 1; }
    .sheet.open .sheet-panel { transform: translateX(0); }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
    .toggle {
      width: 50px;
      height: 28px;
      padding: 3px;
      border-radius: 999px;
      background: #cfc7ba;
      transition: background .18s ease;
    }
    .toggle::after {
      content: "";
      display: block;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      transition: transform .18s ease;
    }
    .toggle.on { background: var(--primary); }
    .toggle.on::after { transform: translateX(22px); }
    .save-bar {
      position: sticky;
      bottom: -1px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(255, 253, 248, 0), var(--surface) 28%);
    }
    .done-state {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
    }
    .done-mark {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      margin: 0 auto 12px;
      border-radius: 18px;
      color: #fff;
      background: var(--primary);
      font-size: 30px;
      font-weight: 900;
    }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
    .day {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: var(--muted);
      background: var(--surface-soft);
      font-size: 11px;
      font-weight: 700;
    }
    .day.marked { color: #fff; background: var(--primary); }
    .progress { height: 10px; overflow: hidden; border-radius: 999px; background: var(--surface-soft); }
    .progress span { display: block; width: 68%; height: 100%; background: var(--accent); }
    .feed-card, .note-card {
      width: 100%;
      display: block;
      padding: 14px;
      margin-bottom: 10px;
      text-align: left;
      color: var(--ink);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #7c4a16;
      font-size: 11px;
      font-weight: 800;
    }
    .toast {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 142px;
      z-index: 40;
      padding: 12px;
      border-radius: 8px;
      color: #fff;
      background: rgba(37, 35, 31, .92);
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      transform: translateY(8px);
      transition: .18s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .admin-shell {
      width: min(100%, 980px);
      min-height: 720px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f9faf8;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .admin-body { display: grid; grid-template-columns: 220px 1fr; min-height: 650px; }
    .admin-nav { padding: 14px; border-right: 1px solid var(--line); background: #f4f6f4; }
    .admin-nav button {
      width: 100%;
      min-height: 38px;
      margin-bottom: 6px;
      padding: 8px 10px;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      text-align: left;
      font-weight: 800;
    }
    .admin-nav button.active { color: #fff; background: var(--admin); }
    .admin-content { padding: 18px; min-width: 0; }
    .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    .metric { padding: 14px; }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric b { display: block; margin-top: 6px; font-size: 24px; }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      font-size: 13px;
    }
    .admin-table th, .admin-table td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    .admin-table th { color: var(--muted); background: #f4f6f4; font-size: 12px; }
    .admin-table tr:last-child td { border-bottom: 0; }

    .inspector h2 { margin-bottom: 4px; font-size: 18px; }
    .story-map { display: grid; gap: 8px; margin-top: 12px; }
    .story-node {
      display: grid;
      gap: 2px;
      min-height: 54px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fff;
      text-align: left;
    }
    .story-node.active { border-color: rgba(53, 100, 85, .45); background: var(--primary-soft); }
    .story-node strong { font-size: 13px; }
    .story-node span { color: var(--muted); font-size: 12px; }
    .definition-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .definition-item {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .definition-item b { display: block; margin-bottom: 4px; font-size: 12px; }
    .definition-item p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.5; }

    @media (max-width: 1180px) {
      .workspace { grid-template-columns: 260px minmax(420px, 1fr); }
      .inspector { position: static; grid-column: 1 / -1; height: auto; border-left: 0; border-top: 1px solid var(--line); }
    }
    @media (max-width: 760px) {
      .workspace { display: block; }
      .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      .stage { padding: 16px 8px 24px; }
      .stage-head { padding: 0 10px; }
      .stage-head h2 { font-size: 20px; }
      .phone-shell { width: min(390px, calc(100vw - 16px)); height: min(844px, calc((100vw - 16px) * 2.164)); }
      .admin-body { grid-template-columns: 1fr; }
      .admin-nav { border-right: 0; border-bottom: 1px solid var(--line); }
      .metric-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="workspace">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">QT</div>
        <div>
          <h1>QT-AI 클릭 목업</h1>
          <p>03 스토리보드 + 04 화면정의서 기반</p>
        </div>
      </div>

      <div class="segment" aria-label="목업 모드">
        <button class="active" data-mode="mobile" type="button">사용자 앱</button>
        <button data-mode="admin" type="button">관리자</button>
      </div>

      <div class="section-title">시연 흐름</div>
      <div class="flow">
        <button class="active" data-flow="core" type="button"><span>P0 핵심 시연</span><small>8</small></button>
        <button data-flow="support" type="button"><span>성경/노트/나눔</span><small>7</small></button>
        <button data-flow="ai" type="button"><span>AI/TTS/확장</span><small>5</small></button>
        <button data-flow="admin" type="button"><span>운영자 콘솔</span><small>8</small></button>
      </div>

      <div id="screenGroups"></div>
    </aside>

    <main class="stage">
      <div class="stage-head">
        <div>
          <h2 id="stageTitle">오늘의 QT 기본</h2>
          <p id="stagePurpose" class="subcopy">앱의 메인 화면. 로그인 후 홈 없이 오늘의 QT로 진입한다.</p>
        </div>
        <span id="flowPill" class="pill">P0 핵심 시연</span>
      </div>

      <section id="mobileMock" class="phone-shell" aria-label="모바일 앱 목업">
        <div class="phone">
          <div id="phoneScreen"></div>
          <div id="toast" class="toast" role="status" aria-live="polite"></div>
        </div>
      </section>

      <section id="adminMock" class="admin-shell" aria-label="관리자 웹 목업" hidden>
        <div class="admin-topbar">
          <div>
            <strong>QT-AI Admin</strong>
            <p class="subcopy" style="margin:3px 0 0">상태 파악, 검증, 신고 처리, 감사 로그 중심의 운영 도구</p>
          </div>
          <span class="pill">Admin Web 1440 x 1024</span>
        </div>
        <div class="admin-body">
          <nav class="admin-nav" aria-label="관리자 화면">
            <button class="active" data-admin="AD-01" type="button">AD-01 대시보드</button>
            <button data-admin="AD-02" type="button">AD-02 QT 관리</button>
            <button data-admin="AD-03" type="button">AD-03 AI 산출물</button>
            <button data-admin="AD-04" type="button">AD-04 신고 처리</button>
            <button data-admin="AD-05" type="button">AD-05 찬양 큐레이션</button>
            <button data-admin="AD-06" type="button">AD-06 공지 관리</button>
            <button data-admin="AD-07" type="button">AD-07 감사 로그</button>
            <button data-admin="AD-08" type="button">AD-08 AI 모니터링</button>
          </nav>
          <div id="adminContent" class="admin-content"></div>
        </div>
      </section>
    </main>

    <aside class="inspector">

      "S-02": () => `${appbar("나눔 상세", "포도나무가지")}<main class="body"><div class="panel"><h4>요한복음 15:1-5 · 2026.05.17</h4><p>마음에 남은 말씀: 말씀 안에 머무는 것이 열매의 시작이라는 점이 마음에 남습니다.</p><p>적용할 일: 오늘 중요한 결정을 서두르지 않고 기도로 확인하겠습니다.</p></div><div class="button-row"><button class="secondary-btn" type="button">좋아요</button><button class="ghost-btn" type="button">댓글</button><button class="ghost-btn" data-action="report" type="button">신고</button></div><div id="reportBox" class="panel" hidden><h4>신고 사유</h4><div class="chip-row"><button class="chip active">부적절한 내용</button><button class="chip">스팸</button><button class="chip">기타</button></div><textarea class="textarea" placeholder="상세 내용 선택 입력"></textarea><button class="danger-btn" data-toast="신고가 접수되었습니다." type="button" style="width:100%;margin-top:8px">신고 접수</button></div><div class="panel"><h4>삭제/숨김 접근</h4><p>삭제되었거나 볼 수 없는 글입니다.</p></div></main>${bottomNav("S")}`,
      "M-01": () => `${appbar("마이페이지", "포도나무가지")}<main class="body"><div class="panel"><div class="toggle-row"><div><h4>포도나무가지</h4><p>카카오 로그인 · ACTIVE</p></div><button class="ghost-btn" data-go="M-04" type="button">관리</button></div></div><div class="panel"><h4>묵상 달력</h4><div class="calendar">${Array.from({ length: 28 }, (_, i) => `<span class="day ${[1,2,5,7,8,13,16,21,22,23].includes(i) ? "marked" : ""}">${i + 1}</span>`).join("")}</div></div><div class="panel"><h4>주간 통계</h4><p>이번 주 4회 · 이번 달 11회</p></div><div class="panel"><h4>월간 묵상 미션</h4><div class="progress"><span></span></div></div><div class="panel"><h4>최근 알림</h4><p>좋아요 2건 · 댓글 1건 · 공지 1건</p></div></main>${bottomNav("M")}`,

    };

    function adminMarkup(id) {
      const meta = screenMeta[id];
      const header = `<div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:14px"><div><h3 style="margin-bottom:4px">${meta.name}</h3><p class="lead-copy" style="margin:0">${meta.purpose}</p></div><span class="badge">${id}</span></div>`;
      if (id === "AD-01") return `${header}<div class="metric-grid">${[["오늘 QT", "게시"], ["검증 대기", "12"], ["신고 대기", "3"], ["공지", "1"]].map(([k, v]) => `<div class="metric"><span>${k}</span><b>${v}</b></div>`).join("")}</div>${table(["작업", "상태", "담당"], [["오늘 QT 게시", "완료", "admin01"], ["AI 해설 검증", "대기", "검수자"], ["신고 댓글 숨김", "처리중", "운영자"]])}`;
      if (id === "AD-02") return `${header}<div class="admin-panel panel"><div class="button-row"><input class="field" value="2026-05-17"><input class="field" value="요한복음 15:1-5"><select class="select"><option>DRAFT</option><option>PUBLISHED</option><option>HIDDEN</option></select></div><div class="button-row" style="margin-top:10px"><button class="ghost-btn">임시저장</button><button class="primary-btn">게시</button></div></div>${table(["검증", "결과", "메모"], [["날짜 중복", "정상", "-"], ["본문 범위", "정상", "시작 절 <= 끝 절"], ["감사 로그", "기록 예정", "게시 시점 저장"]])}`;
      if (id === "AD-03") return `${header}<div class="chip-row">${["검증중", "승인", "반려", "숨김"].map((c, i) => `<button class="chip ${i === 0 ? "active" : ""}">${c}</button>`).join("")}</div>${table(["유형", "본문 좌표", "검증 체크", "처리"], [["해설", "요 15:2", "출처 · 금지 표현 · 사실 정합성", "승인 / 반려 / 보류"], ["Q&A 답변", "요 15:5", "추천 · 말투 · 단발성", "승인 / 반려 / 숨김"]])}<div class="panel"><h4>노출 정책</h4><p>검증용 체크리스트 원문과 비공개 메타데이터는 사용자 화면에 노출하지 않습니다.</p></div>`;
      if (id === "AD-04") return `${header}${table(["상태", "대상", "사유", "처리"], [["RECEIVED", "나눔 댓글", "부적절한 내용", "숨김 / 반려 / 제재"], ["REVIEWING", "AI 답변", "정책 위반 의심", "검토중"]])}`;
      if (id === "AD-05") return `${header}${table(["곡명", "아티스트", "링크", "상태"], [["내 주를 가까이", "찬양팀", "https://...", "ACTIVE"], ["은혜", "아티스트", "링크 오류", "HIDDEN"]])}<div class="panel"><p>사용자 기기 음원 업로드는 제공하지 않습니다. 외부 링크와 메타데이터만 관리합니다.</p></div>`;
      if (id === "AD-06") return `${header}<div class="panel"><label class="field-label">공지 제목</label><input class="field" value="5월 QT 업데이트 안내"><label class="field-label">본문</label><textarea class="textarea">오늘의 QT 해설 콘텐츠가 보강되었습니다.</textarea><div class="button-row" style="margin-top:10px"><button class="ghost-btn">초안 저장</button><button class="primary-btn">발행</button></div></div>${table(["상태", "알림", "감사 로그"], [["DRAFT", "없음", "작성 기록"], ["PUBLISHED", "NOTICE 생성", "발행 기록"]])}`;
      if (id === "AD-07") return `${header}${table(["시각", "작업자", "작업", "대상"], [["15:22", "admin01", "QT 게시", "2026-05-17"], ["14:50", "reviewer02", "AI 해설 승인", "asset-1024"], ["13:31", "admin01", "신고 처리", "report-88"]])}<div class="panel"><p>감사 로그에는 수정/삭제 액션을 제공하지 않습니다.</p></div>`;
      return `${header}<div class="metric-grid">${[["검증 실패율", "4.8%"], ["차단 질문", "18"], ["재생성", "7"], ["대기", "12"]].map(([k, v]) => `<div class="metric"><span>${k}</span><b>${v}</b></div>`).join("")}</div>${table(["지표", "상태", "다음 행동"], [["반려 사유 분포", "교리 판단 요청 증가", "평가 큐 점검"], ["체크리스트 버전", "v3 통과율 하락", "버전별 비교"], ["집계", "정상", "상세 보기"]])}`;
    }
    function table(heads, rows) {
      return `<table class="admin-table"><thead><tr>${heads.map((h) => `<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
    }

    function renderSidebar() {
      const groups = {};
      Object.entries(screenMeta).forEach(([id, meta]) => {
        if (id.startsWith("AD")) return;
        groups[meta.group] ||= [];
        groups[meta.group].push(id);
      });
      $("#screenGroups").innerHTML = Object.entries(groups).map(([group, ids]) => `<div class="section-title">${group}</div><div class="screen-group">${ids.map((id) => `<button class="screen-link ${state.screen === id ? "active" : ""}" data-go="${id}" type="button"><span>${id}</span><span>${screenMeta[id].name}</span></button>`).join("")}</div>`).join("");
    }
    function renderStoryMap() {
      const ids = flows[state.flow];
      $("#storyMap").innerHTML = ids.map((id, i) => `<button class="story-node ${state.screen === id || state.admin === id ? "active" : ""}" data-${id.startsWith("AD") ? "admin" : "go"}="${id}" type="button"><strong>${i + 1}. ${id}</strong><span>${screenMeta[id].name}</span></button>`).join("");
    }
    function renderDefinitions(meta) {
      $("#definitionList").innerHTML = [
        ["화면 목적", meta.purpose],
        ["필수 상태", meta.states.join(" · ")],
        ["UX 원칙", "핵심 정보는 유지하고 실패 영역에만 재시도 안내를 둡니다. 저장/공유/탈퇴처럼 영향이 큰 행동은 결과를 명확히 표시합니다."]
      ].map(([title, copy]) => `<div class="definition-item"><b>${title}</b><p>${copy}</p></div>`).join("");
    }
    function renderMobile() {
      const meta = screenMeta[state.screen];
      $("#stageTitle").textContent = meta.name;
      $("#stagePurpose").textContent = meta.purpose;
      $("#flowPill").textContent = flowNames[state.flow];
      $("#phoneScreen").innerHTML = (renderers[state.screen] || renderers["Q-01"])();
      renderDefinitions(meta);
    }
    function renderAdmin() {
      const meta = screenMeta[state.admin];
      $("#stageTitle").textContent = meta.name;
      $("#stagePurpose").textContent = meta.purpose;
      $("#flowPill").textContent = flowNames.admin;
      $("#adminContent").innerHTML = adminMarkup(state.admin);
      $$(".admin-nav button").forEach((btn) => btn.classList.toggle("active", btn.dataset.admin === state.admin));
      renderDefinitions(meta);
    }
    function render() {
      const isAdmin = state.mode === "admin";
      $("#mobileMock").hidden = isAdmin;
      $("#adminMock").hidden = !isAdmin;
      $$(".segment button").forEach((btn) => btn.classList.toggle("active", btn.dataset.mode === state.mode));
      $$(".flow button").forEach((btn) => btn.classList.toggle("active", btn.dataset.flow === state.flow));
      renderSidebar();
      renderStoryMap();
      if (isAdmin) renderAdmin();
      else renderMobile();
    }
    function go(id) {
      if (id.startsWith("AD")) {
        state.mode = "admin";
        state.flow = "admin";
        state.admin = id;
      } else {
        state.mode = "mobile";
        state.screen = id;
        if (flows.core.includes(id)) state.flow = "core";
        else if (flows.support.includes(id)) state.flow = "support";
        else if (flows.ai.includes(id)) state.flow = "ai";
      }
      render();
    }
    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    document.addEventListener("click", (event) => {
      const goBtn = event.target.closest("[data-go]");
      const adminBtn = event.target.closest("[data-admin]");
      const modeBtn = event.target.closest("[data-mode]");
      const flowBtn = event.target.closest("[data-flow]");
      const actionBtn = event.target.closest("[data-action]");
      const toastBtn = event.target.closest("[data-toast]");
      const filterBtn = event.target.closest("[data-filter]");
      const verseRow = event.target.closest("[data-select-verse]");
      if (goBtn) go(goBtn.dataset.go);
      if (adminBtn) {
        state.mode = "admin";
        state.flow = "admin";
        state.admin = adminBtn.dataset.admin;
        render();
      }
      if (modeBtn) {
        state.mode = modeBtn.dataset.mode;
        if (state.mode === "admin") state.flow = "admin";
        render();
      }
      if (flowBtn) {
        state.flow = flowBtn.dataset.flow;
        if (state.flow === "admin") {
          state.mode = "admin";
          state.admin = "AD-01";
        } else {
          state.mode = "mobile";
          state.screen = flows[state.flow][0];
        }
        render();
      }
      if (verseRow) {
        const verse = verseRow.dataset.selectVerse;
        state.noteVerses = state.noteVerses.includes(verse)
          ? state.noteVerses.filter((item) => item !== verse)
          : [...state.noteVerses, verse].sort((a, b) => Number(a) - Number(b));
        render();
      }
      if (filterBtn) {
        state.noteFilter = filterBtn.dataset.filter;
        render();
      }
      if (actionBtn) {
        const action = actionBtn.dataset.action;
        if (action === "share") state.shareOn = !state.shareOn;
        if (action === "english") state.englishOpen = !state.englishOpen;
        if (action === "toggle-explain") state.explanationOpen = !state.explanationOpen;
        if (action === "report") {
          const box = $("#reportBox");
          if (box) box.hidden = !box.hidden;
          return;
        }
        render();
      }
      if (event.target.closest("[data-close-sheet]")) {
        state.screen = "Q-01";
        render();
      }
      if (toastBtn) showToast(toastBtn.dataset.toast);
    });

    render();
  </script>
</body>
</html>
